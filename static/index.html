<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Co-worker Engine</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260624-2" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <aside class="side-panel">
          <div class="status-block">
            <h2>Agent</h2>
            <select id="agentSelect" aria-label="Select AI co-worker">
              <option value="gucci_group_boss">Group Boss</option>
              <option value="gucci_group_ceo">Group CEO</option>
              <option value="gucci_group_chro" selected>Group CHRO</option>
              <option value="regional_comms_manager">Regional Comms Manager</option>
            </select>
          </div>
        </aside>

        <section class="chat-panel">
          <div class="chat-header">
            <div>
              <p class="eyebrow">AI Co-worker</p>
              <h1 id="agentTitle">Gucci Group CHRO</h1>
              <p id="agentDescription" class="muted">
                A strategic HR stakeholder helps you pressure-test leadership and talent development decisions.
              </p>
            </div>
            <button id="resetButton" type="button" title="Start a new session">Reset</button>
          </div>

          <div id="messages" class="messages" aria-live="polite"></div>

          <form id="chatForm" class="composer">
            <textarea
              id="messageInput"
              name="message"
              rows="3"
              placeholder="Ask the selected AI co-worker about the simulation..."
              required
            ></textarea>
            <button type="submit">Send</button>
          </form>
        </section>
      </section>
    </main>

    <script src="/static/app.js?v=20260624-2"></script>
  </body>
</html>
